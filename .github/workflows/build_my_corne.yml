name: Build Corne Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli
    steps:
      - name: Checkout content
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Find correct keyboard name
        run: |
          echo "=== Ищем точное имя клавиатуры в QMK ==="
          qmk list-keyboards | grep crkbd

      - name: Build firmware
        run: |
          qmk compile -kb crkbd/rev4 -km fff

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: corne_firmware
          path: ./*.uf2
